name: Release

on:
  release:
    types: [created]

  workflow_dispatch:
    inputs:
      release:
        description: "Release tag (SemVer vX.X.X)"
        required: true
        default: v1.0.0

env:
  REGISTRY: ghcr.io/dfradehubs
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  api:
    name: Build & Push API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - id: read_tag
        name: Read release tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            export TAG="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export TAG="${{ inputs.release }}"
          fi
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.read_tag.outputs.release_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: api/
          platforms: ${{ env.PLATFORMS }}
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/agentgram-api:${{ steps.read_tag.outputs.release_tag }}
            ${{ env.REGISTRY }}/agentgram-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  web:
    name: Build & Push Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - id: read_tag
        name: Read release tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            export TAG="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export TAG="${{ inputs.release }}"
          fi
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.read_tag.outputs.release_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: web/
          platforms: ${{ env.PLATFORMS }}
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/agentgram-web:${{ steps.read_tag.outputs.release_tag }}
            ${{ env.REGISTRY }}/agentgram-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
