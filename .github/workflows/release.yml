name: Release

on:
  release:
    types: [created]

  workflow_dispatch:
    inputs:
      release:
        description: "Release tag (SemVer vX.X.X)"
        required: true
        default: v1.0.0

env:
  REGISTRY: ghcr.io/dfradehubs

jobs:
  api:
    name: Build & Push API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - id: read_tag
        name: Read release tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            export TAG="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export TAG="${{ inputs.release }}"
          fi
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.read_tag.outputs.release_tag }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          TAG: ${{ steps.read_tag.outputs.release_tag }}
        run: |
          docker build -t ${{ env.REGISTRY }}/agentgram-api:${TAG} \
                        -t ${{ env.REGISTRY }}/agentgram-api:latest \
                        api/
          docker push ${{ env.REGISTRY }}/agentgram-api:${TAG}
          docker push ${{ env.REGISTRY }}/agentgram-api:latest

  web:
    name: Build & Push Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - id: read_tag
        name: Read release tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            export TAG="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export TAG="${{ inputs.release }}"
          fi
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.read_tag.outputs.release_tag }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          TAG: ${{ steps.read_tag.outputs.release_tag }}
        run: |
          docker build -t ${{ env.REGISTRY }}/agentgram-web:${TAG} \
                        -t ${{ env.REGISTRY }}/agentgram-web:latest \
                        web/
          docker push ${{ env.REGISTRY }}/agentgram-web:${TAG}
          docker push ${{ env.REGISTRY }}/agentgram-web:latest
