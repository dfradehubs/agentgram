# Development configuration (auth disabled, for E2E testing)

server:
  port: "${ENV:PORT}"
  host: "${ENV:SERVER_HOST}"

auth:
  enabled: false
  admin_users:
    - "anonymous@localhost"
  admin_groups:
    - "*"

logging:
  level: "${ENV:LOG_LEVEL}"
  format: "json"

langfuse:
  enabled: false

redis:
  addr: "${ENV:REDIS_ADDR}"
  password: "${ENV:REDIS_PASSWORD}"

database:
  host: "${ENV:POSTGRES_HOST}"
  port: 5432
  user: "${ENV:POSTGRES_USER}"
  password: "${ENV:POSTGRES_PASSWORD}"
  dbname: "${ENV:POSTGRES_DB}"
  sslmode: "${ENV:POSTGRES_SSLMODE}"
  max_conns: 25

mcp_server:
  enabled: true
  tool_call_timeout: "2m"
  max_tool_call_rounds: 10

metrics:
  enabled: true
  retention_days: 30
  cleanup_interval: "1h"
