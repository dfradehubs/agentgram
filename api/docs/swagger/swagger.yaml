          $ref: '#/definitions/internal_handlers.PublicLLMModel'
        type: array
      features:
        $ref: '#/definitions/internal_handlers.FeatureFlags'
    type: object
  internal_handlers.PublicLLMModel:
    properties:
      default:
        type: boolean
      id:
        type: string
      name:
        type: string
      provider:
        type: string
    type: object
  internal_handlers.UserResponse:
    properties:
      email:
        type: string
      groups:
        items:
          type: string
