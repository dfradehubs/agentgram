basePath: /
definitions:
  github_com_dfradehubs_agentgram-api_internal_models.AgentListResponse:
    properties:
      agents:
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.AgentResponse'
        type: array
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.AgentResponse:
    properties:
      category:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      protocol:
        type: string
      require_github_token:
        type: boolean
      status:
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.Attachment:
    properties:
      content_type:
        type: string
      data:
        description: base64
        type: string
      filename:
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.ChatMessage:
    properties:
      agent_id:
        description: Which agent sent/received this message (multi-agent sessions)
        type: string
      attachments:
        description: File attachments (images, PDFs, etc.)
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.Attachment'
        type: array
      broadcast_agent_ids:
        description: 'For broadcast messages: which agents it was sent to'
        items:
          type: string
        type: array
      content:
        type: string
      content_parts:
        description: Ordered text/tool interleaving for reconstruction
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ContentPart'
        type: array
      is_admin:
        description: Whether the user who sent this message is an admin
        type: boolean
      role:
        description: '"user" | "assistant" | "system"'
        type: string
      tool_calls:
        description: Tool calls made during this message
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.StoredToolCall'
        type: array
      tool_results:
        description: Tool results for the tool calls
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.StoredToolResult'
        type: array
      user_email:
        description: Email of the user who sent this message
        type: string
      user_name:
        description: Display name of the user who sent this message
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.ChatRequest:
    properties:
      group_id:
        type: string
      messages:
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ChatMessage'
        type: array
      send_context:
        type: boolean
      session_id:
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.ContentPart:
    properties:
      text:
        description: Text content (for type="text")
        type: string
      tool_index:
        description: Index into ToolCalls (for type="tool_use"); pointer so 0 is not
          omitted
        type: integer
      type:
        description: '"text" or "tool_use"'
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.HealthCheckConfig:
    properties:
      enabled:
        type: boolean
      endpoint:
        description: 'Path appended to agent endpoint (default: /health)'
        type: string
      interval_seconds:
        type: integer
      timeout_seconds:
        type: integer
      url:
        description: Full URL (optional, overrides endpoint + path)
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.HealthResponse:
    properties:
      details:
        additionalProperties: true
        type: object
      status:
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.InheritedPermission:
    properties:
      from_group:
        type: string
      value:
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.InheritedPerms:
    properties:
      groups:
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.InheritedPermission'
        type: array
      users:
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.InheritedPermission'
        type: array
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.PollingConfig:
    properties:
      interval_ms:
        type: integer
      timeout_seconds:
        type: integer
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.RateLimitConfig:
    properties:
      requests_per_hour:
        type: integer
      requests_per_minute:
        type: integer
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.Session:
    properties:
      agent_ids:
        description: Participating agents
        items:
          type: string
        type: array
      app_name:
        type: string
      created_at:
        description: Unix timestamp
        type: integer
      group_id:
        description: Agent group ID (for collaborative sessions)
        type: string
      is_multi_agent:
        description: Whether this is a multi-agent session
        type: boolean
      last_activity:
        description: Unix timestamp
        type: integer
      message_count:
        type: integer
      messages:
        description: Only included when fetching single session
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ChatMessage'
        type: array
      session_id:
        type: string
      session_name:
        type: string
      user_id:
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.SessionGetResponse:
    properties:
      has_more:
        type: boolean
      messages:
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ChatMessage'
        type: array
      next_cursor:
        description: Message index to use as `before` for the next page
        type: integer
      session:
        $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.Session'
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.SessionListResponse:
    properties:
      sessions:
        items:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.Session'
        type: array
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.SessionRenameRequest:
    properties:
      session_name:
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.StoredToolCall:
    properties:
      args:
        additionalProperties: true
        type: object
      id:
        type: string
      name:
        type: string
    type: object
  github_com_dfradehubs_agentgram-api_internal_models.StoredToolResult:
    properties:
      id:
        type: string
      name:
        type: string
      response:
        additionalProperties: true
        type: object
    type: object
  internal_handlers.AdminAgentRequest:
    properties:
      adk_app_name:
        type: string
      adk_user_id:
        type: string
      agent_card_path:
        type: string
      allowed_groups:
        items:
          type: string
        type: array
      allowed_users:
        items:
          type: string
        type: array
      category:
        type: string
      description:
        type: string
      endpoint:
        type: string
      forward_authorization:
        type: boolean
      headers:
        additionalProperties:
          type: string
        type: object
      health_check:
        $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.HealthCheckConfig'
      id:
        type: string
      name:
        type: string
      pipeline_final_agent:
        type: string
      polling:
        $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.PollingConfig'
      protocol:
        type: string
      rate_limit:
        $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.RateLimitConfig'
      require_github_token:
        type: boolean
    type: object
  internal_handlers.AdminAgentResponse:
    properties:
      adk_app_name:
        type: string
      adk_user_id:
        type: string
      agent_card_path:
        type: string
      allowed_groups:
        items:
          type: string
        type: array
      allowed_users:
        items:
          type: string
        type: array
      category:
        type: string
      description:
        type: string
      endpoint:
        type: string
      forward_authorization:
        type: boolean
      headers:
        additionalProperties:
          type: string
        type: object
      health_check:
        $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.HealthCheckConfig'
      id:
        type: string
      inherited_permissions:
        $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.InheritedPerms'
      name:
        type: string
      pipeline_final_agent:
        type: string
      polling:
        $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.PollingConfig'
      protocol:
        type: string
      rate_limit:
        $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.RateLimitConfig'
      require_github_token:
