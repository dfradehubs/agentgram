host: localhost:8080
info:
  contact: {}
  description: Multiplexer API for AI agents with AG-UI protocol. Connects to remote
    agents, handles authentication, permissions, and emits AG-UI SSE events.
  title: Agentgram API
  version: "0.1.0"
paths:
  /api/admin/agents:
    get:
      description: Returns all agents with full configuration including endpoints,
        permissions, and health status. Requires admin role.
      produces:
      - application/json
      responses:
        "200":
          description: agents array
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/internal_handlers.AdminAgentResponse'
              type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: List all agents (admin)
      tags:
      - admin-agents
    post:
      consumes:
      - application/json
      description: Creates a new agent configuration. Requires admin role. Fields
        id, name, protocol, and endpoint are required.
      parameters:
      - description: Agent configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.AdminAgentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.AdminAgentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Create a new agent (admin)
      tags:
      - admin-agents
  /api/admin/agents/{id}:
    delete:
      description: Deletes an agent configuration. Requires admin role.
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Agent deleted
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Delete an agent (admin)
      tags:
      - admin-agents
    get:
      description: Returns full agent configuration including endpoint, headers, permissions,
        and inherited permissions. Requires admin role.
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AdminAgentResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get agent details (admin)
      tags:
      - admin-agents
    put:
      consumes:
      - application/json
      description: Updates an existing agent configuration. Requires admin role.
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated agent configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.AdminAgentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AdminAgentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Update an agent (admin)
      tags:
      - admin-agents
  /api/agents:
    get:
      description: Returns only the agents the authenticated user has access to. Admins
        see all agents.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.AgentListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: List agents
      tags:
      - agents
  /api/agents/{agentId}:
    get:
      description: Returns a single agent by ID. Requires access permission or admin
        role.
      parameters:
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.AgentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get agent details
      tags:
      - agents
  /api/agents/{agentId}/chat:
    post:
      consumes:
      - application/json
      description: |-
        Sends a chat request to an agent and returns a streaming SSE response with AG-UI protocol events.
        The response is a Server-Sent Events stream (text/event-stream) containing AG-UI events:
        RUN_STARTED, TEXT_MESSAGE_START, TEXT_MESSAGE_CONTENT, TEXT_MESSAGE_END, TOOL_CALL_START, TOOL_CALL_ARGS, TOOL_CALL_END, RUN_FINISHED, RUN_ERROR.
      parameters:
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      - description: Chat request with messages and optional session_id
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ChatRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: 'SSE stream with AG-UI events (e.g. data: {\"type\":\"TEXT_MESSAGE_CONTENT\",\"messageId\":\"...\",\"delta\":\"Hello\"})'
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Chat with an agent
      tags:
      - chat
  /api/agents/{agentId}/health:
    get:
      description: Returns the health status of a specific agent
      parameters:
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.HealthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get agent health status
      tags:
      - agents
  /api/agents/{agentId}/sessions:
    get:
      description: Returns all sessions for the authenticated user and the specified
        agent
      parameters:
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.SessionListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: List sessions for an agent
      tags:
      - sessions
  /api/agents/{agentId}/sessions/{sessionId}:
    delete:
      description: Permanently deletes a session and all its messages. Only the session
        owner can delete it.
      parameters:
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      - description: Session ID (UUID)
        in: path
        name: sessionId
        required: true
        type: string
      responses:
        "204":
          description: Session deleted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Delete a session
      tags:
      - sessions
    get:
      description: Returns a session and its messages. Supports cursor-based pagination.
        When limit=0 (default), returns all messages in legacy format for backward
        compatibility.
      parameters:
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      - description: Session ID (UUID)
        in: path
        name: sessionId
        required: true
        type: string
      - default: 0
        description: Number of messages to return (0 = all)
        in: query
        name: limit
        type: integer
      - description: 'Cursor: message index to load messages before'
        in: query
        name: before
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated response (when limit > 0)
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.SessionGetResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_dfradehubs_agentgram-api_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
